services:
  - type: web
    name: maritime-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false # Set this in Render dashboard to your Vercel URL
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: AISSTREAM_API_KEY
        sync: false # Set this in Render dashboard (if you have one)
